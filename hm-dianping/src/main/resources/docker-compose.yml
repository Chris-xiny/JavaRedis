version: '1.0'

services:
  redis-6379:
    image: redis:latest
    container_name: redis-6379
    ports:
      - "6379:6379"
    volumes:
      - redis-data-6379:/data
    command: redis-server --appendonly yes --requirepass 000000

  redis-6380:
    image: redis:latest
    container_name: redis-6380
    ports:
      - "6380:6379"
    volumes:
      - redis-data-6380:/data
    command: redis-server --appendonly yes --requirepass 000000

  redis-6381:
    image: redis:latest
    container_name: redis-6381
    ports:
      - "6381:6379"
    volumes:
      - redis-data-6381:/data
    command: redis-server --appendonly yes --requirepass 000000

volumes:
  redis-data-6379:
  redis-data-6380:
  redis-data-6381: